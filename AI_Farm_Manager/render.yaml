# Render Blueprint — https://render.com/docs/blueprint-spec
# Deploy from repo root: AI_Farm_Manager/

services:
  - type: web
    name: ai-farm-manager
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: ADMIN_PASSWORD
        sync: false
      - key: SERVER_TOKEN
        sync: false
      - key: GPORTAL_FTP_HOST
        sync: false
      - key: GPORTAL_FTP_USER
        sync: false
      - key: GPORTAL_FTP_PASS
        sync: false
      - key: GPORTAL_FTP_PATH
        sync: false
      - key: ENABLE_AI_BOT
        sync: false
      - key: LLM_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
