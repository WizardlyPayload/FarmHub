# AI Farm Manager — production stack (Coolify, Hetzner VPS, or plain Docker Compose)
# Copy .env from backend/.env.example, set secrets, then: docker compose up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: farmhub-local-build:latest  # Forces Portainer to name the locally baked image
    ports:
      - "8000:8000"
    volumes:
      # On TrueNAS, it is much safer to use an absolute path for persistent data.
      # Replace the left side with a real folder path on your NAS pool.
      # Example: /mnt/tank/appdata/farmhub/data:/app/data
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s