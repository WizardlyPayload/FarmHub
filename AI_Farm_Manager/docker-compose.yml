# AI Farm Manager — Portainer / TrueNAS friendly
#
# Stack variables: set these in Portainer → Stack → Environment (or the container’s Env tab).
# Syntax ${VAR} passes host/Portainer values into the container (Compose interpolation).
#
# PORTAINER TROUBLESHOOTING — “nothing on 8081” / “no ports shown”
# - The app MUST have ENCRYPTION_KEY set (Fernet string). If missing, uvicorn exits immediately:
#   check Logs for: ENCRYPTION_KEY is not set. No process listens → connection refused on the host port.
# - Published port: host ${APP_PORT:-8081} → container 8000. In UI: Container → scroll to “Published ports”.
#   If the container is crash-looping, ports may look wrong or the service stays “starting”.
# - After deploy: curl http://HOST:8081/health (or your APP_PORT) — expect JSON with "status":"ok".
#
# Local Ollama: set OLLAMA_BASE_URL to your API base, e.g. http://192.168.x.x:11434
# (backend normalizes /v1). Default model below is llama3.2 — change in Portainer if you use another tag.
#
# Volumes: no bind mounts by default (TrueNAS paths often break if missing). Add in Portainer when ready.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: farmhub-ai-farm-manager:latest
    ports:
      # Host port (set APP_PORT in Portainer, default 8081) → app listens on 8000 inside the container
      - "${APP_PORT:-8081}:8000"
    # Optional: load from a file on the host (only if that path exists on your NAS)
    # env_file:
    #   - stack.env
    environment:
      PORT: ${PORT:-8000}
      # Required for at-rest encryption of secrets in data/
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # Mod / API auth
      SERVER_TOKEN: ${SERVER_TOKEN}
      # Admin UI (/admin)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Farm Dashboard ↔ backend link (same value in desktop app “link key”)
      FARMDASH_INTEGRATION_KEY: ${FARMDASH_INTEGRATION_KEY}
      # In-game bot + LLM (Ollama: use openai provider + local base URL)
      ENABLE_AI_BOT: ${ENABLE_AI_BOT:-true}
      # Quote default so YAML does not treat `!` as a tag
      TRIGGER_PREFIX: "${TRIGGER_PREFIX:-!hank}"
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      LLM_MODEL: ${LLM_MODEL:-llama3.2}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      # Either name works; OLLAMA_BASE_URL is a convenience label in Portainer (see config.py)
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-}
      # Dashboard snapshot source (often empty when using PC push mode)
      DASHBOARD_JSON_URL: ${DASHBOARD_JSON_URL:-}
      DASHBOARD_SERVER_ID: ${DASHBOARD_SERVER_ID:-}
      DASHBOARD_PUSH_MODE: ${DASHBOARD_PUSH_MODE:-0}
      # Gemini (optional)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
      GEMINI_API_ENDPOINT: ${GEMINI_API_ENDPOINT:-generativelanguage}
      GEMINI_REST_API_VERSION: ${GEMINI_REST_API_VERSION:-v1}
      # URLs / CORS
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      CORS_ORIGINS: "${CORS_ORIGINS:-*}"
      # Optional data dir override (default /app/data inside container)
      DATA_DIR: ${DATA_DIR:-}
      # Optional hardening (see docs/AI_SERVER_SECURITY.md)
      REQUIRE_AUTH_FOR_ROOT_HTML: ${REQUIRE_AUTH_FOR_ROOT_HTML:-0}
      HEALTH_RESPONSE_DETAIL: ${HEALTH_RESPONSE_DETAIL:-full}
    # No bind mounts by default (avoids TrueNAS/Portainer deploy errors when ./data does not exist).
    # Add in Portainer → container → Volumes, or uncomment:
    # volumes:
    #   - /mnt/YOUR_POOL/appdata/farmhub/data:/app/data
    #   - /mnt/YOUR_POOL/appdata/farmhub/.env:/app/.env
    restart: unless-stopped
    healthcheck:
      # Always hits the container’s internal port (8000), not the host APP_PORT
      test:
        [
          "CMD",
          "python",
          "-c",
          "import os,urllib.request; urllib.request.urlopen('http://127.0.0.1:%s/health' % os.environ.get('PORT','8000'), timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
