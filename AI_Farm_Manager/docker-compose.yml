# AI Farm Manager — production stack (Coolify, Hetzner VPS, or plain Docker Compose)
# Copy .env from backend/.env.example, set secrets, then: docker compose up -d --build

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Customer configs + encrypted bot_servers.json — backup this directory
      - ./data:/app/data
      # Persist admin UI saves: `/admin` merges into `/app/.env`. Without this, the file lives in the
      # container layer and is lost on recreate. Create the host file first: `touch .env` (same dir as this compose file).
      # If you only use Coolify's Environment UI, you can omit this — but then prefer editing env there, not /admin.
      - ./.env:/app/.env
    # Place a `.env` next to this file (copy from `backend/.env.example`). Must include at least
    # ENCRYPTION_KEY, ADMIN_PASSWORD, SERVER_TOKEN, and your LLM / FTP settings.
    # Optional hardening for public hosts: REQUIRE_AUTH_FOR_ROOT_HTML=1, HEALTH_RESPONSE_DETAIL=minimal
    # (see FarmHub/docs/AI_SERVER_SECURITY.md).
    env_file:
      - .env
    restart: unless-stopped
    # Mirrors Dockerfile HEALTHCHECK — Coolify can also set HTTP health path `/health` on port 8000.
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
