# AI Farm Manager — production stack (Coolify, Hetzner VPS, or plain Docker Compose)
# Copy .env from backend/.env.example, set secrets, then: docker compose up -d --build

services:
  web:
    build: .
    ports:
      - "${APP_PORT:-8081}:8000"  # <-- This lets you change the port in Portainer
    env_file:
      - stack.env                 # <-- This tells the app to use Portainer's UI variables
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s
